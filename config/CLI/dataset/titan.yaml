data:
  #args forwarded (linked) to model
  dataset_name: titan_full
  num_input_steps: 1
  num_pred_steps_train: 1
  num_pred_steps_val_test: 1
  batch_size: 4 # per device    If afcrps loss used, has to be set as effective_batch_size*noise_members

  noise_strategy: "CondLayerNorm" # "forcing" or "CondLayerNorm" or "None"
  noise_members: 4 # total number of members
  
  #other args
  num_workers: 2
  prefetch_factor: null
  pin_memory: False
  dataset_conf:
    periods:
      train:
        start: 2021010100
        end: 2021010100
        obs_step: 3600
      valid:
        start: 2021010100
        end: 2021010100
        obs_step: 3600
        obs_step_btw_t0: 10800
      test:
        start: 2023050122
        end: 2023080122
        obs_step: 3600
        obs_step_btw_t0: 10800
    grid:
      name: PAAROME_1S40
      border_size: 0
      subdomain: [100, 612, 240, 880]
      proj_name: PlateCarree
      projection_kwargs: {}
    settings:
      standardize: true
      file_format: npy
    params:
      aro_t2m:
        levels: [2]
        kind: input_output
      aro_r2:
        levels: [2]
        kind: input_output
      aro_tp:
        levels: [0]
        kind: input_output
      aro_u10:
        levels: [10]
        kind: input_output
      aro_v10:
        levels: [10]
        kind: input_output
      aro_t:
        levels: [250, 500, 700, 850]
        kind: input_output
      aro_u:
        levels: [250, 500, 700, 850]
        kind: input_output
      aro_v:
        levels: [250, 500, 700, 850]
        kind: input_output
      aro_z:
        levels: [250, 500, 700, 850]
        kind: input_output
      arp_t:
        levels: [250, 500, 700, 850]
        kind: input
      arp_u:
        levels: [250, 500, 700, 850]
        kind: input
      arp_v:
        levels: [250, 500, 700, 850]
        kind: input
      arp_z:
        levels: [250, 500, 700, 850]
        kind: input